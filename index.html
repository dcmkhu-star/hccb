<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Hoboken Cove Community Boathouse — Get in a kayak.</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --paper:#fbf6ec;
    --paper-2:#f1e9d6;
    --ink:#111111;
    --ink-2:#4a4a4a;
    --coral:#e63b5b;
    --coral-deep:#b81e3d;
    --teal:#41b5a1;
    --teal-deep:#2a8c7c;
    --orange:#f08a3f;
    --orange-deep:#c4651b;
    --cove:#41b5a1;          /* alias to teal so map etc. still works */
    --cove-deep:#2a8c7c;
    --algae:#41b5a1;
    --rule:#e7dcc4;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper);color:var(--ink);
    font-family:"DM Sans",system-ui,sans-serif;font-size:16px;line-height:1.5;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  a{color:inherit;text-decoration:none}
  button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
  .display{font-family:"Bricolage Grotesque",sans-serif;font-weight:700;letter-spacing:-.025em;line-height:.94}
  .mono{font-family:"JetBrains Mono",monospace}
  .container{max-width:1340px;margin:0 auto;padding:0 32px}

  /* TICKER */
  .ticker{
    background:var(--ink);color:var(--paper);
    font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:.06em;text-transform:uppercase;
    overflow:hidden;
  }
  .ticker .row{display:flex;justify-content:space-between;padding:10px 32px;max-width:1340px;margin:0 auto;align-items:center}
  .ticker .live{display:inline-flex;align-items:center;gap:8px}
  .ticker .dot{width:8px;height:8px;border-radius:50%;background:var(--orange);box-shadow:0 0 0 3px rgba(255,106,44,.25);animation:pulse 1.8s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(255,106,44,.25)}50%{box-shadow:0 0 0 6px rgba(255,106,44,.05)}}

  /* NAV */
  .nav{
    display:flex;align-items:center;justify-content:space-between;
    padding:22px 32px;max-width:1340px;margin:0 auto;
    border-bottom:1px solid var(--rule);
  }
  .brand{display:flex;align-items:center;gap:14px}
  .brand-mark{
    width:46px;height:46px;display:block;
    background:#fff;
  }
  .brand-mark img{width:100%;height:100%;display:block;object-fit:contain}
  .brand h1{font-family:"Bricolage Grotesque";font-weight:700;font-size:22px;margin:0;letter-spacing:-.02em;line-height:1}
  .brand .tagline{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-2);margin-top:3px}
  .nav ul{display:flex;gap:28px;list-style:none;padding:0;margin:0;font-size:14px;font-weight:500}
  .nav-actions{display:flex;gap:10px;align-items:center}
  .nav .cta{
    background:var(--orange);color:#fff;padding:13px 22px;border-radius:999px;font-size:14px;font-weight:600;
    display:inline-flex;align-items:center;gap:10px;
    box-shadow:0 4px 0 var(--orange-deep);
    transition:.1s;
  }
  .nav .cta:active{transform:translateY(2px);box-shadow:0 2px 0 var(--orange-deep)}
  .nav .cta::after{content:"→"}
  .nav .donate-btn{
    background:var(--coral);color:#fff;padding:13px 22px;border-radius:999px;font-size:14px;font-weight:600;
    display:inline-flex;align-items:center;gap:10px;
    box-shadow:0 4px 0 var(--coral-deep);
    transition:.1s;
  }
  .nav .donate-btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--coral-deep)}
  .nav .donate-btn::before{content:"♥"}

  /* HERO */
  .hero{padding:48px 0 64px;position:relative}
  .hero .container{display:grid;grid-template-columns:1.25fr 1fr;gap:48px;align-items:end}
  .hero h2{
    font-family:"Bricolage Grotesque";font-weight:800;
    font-size:clamp(72px,11vw,180px);line-height:.88;letter-spacing:-.035em;
    margin:0 0 36px;
  }
  .hero h2 .blue{color:var(--teal)}
  .hero h2 .orange{color:var(--orange)}
  .hero h2 .coral{color:var(--coral)}
  .hero h2 .stroke{
    -webkit-text-stroke:2px var(--ink);color:transparent;
    font-style:italic;
  }
  .hero h2 .wavy{
    background:linear-gradient(180deg,transparent 65%,var(--orange) 65%,var(--orange) 78%,transparent 78%);
    padding:0 4px;
  }
  .hero .lede{font-size:20px;max-width:48ch;color:var(--ink-2);line-height:1.45}
  .hero-meta{
    margin-top:36px;display:flex;gap:24px;flex-wrap:wrap;font-family:"JetBrains Mono",monospace;
    font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-2);
  }
  .hero-meta span{display:inline-flex;align-items:center;gap:8px}
  .hero-meta span::before{content:"";width:7px;height:7px;background:var(--algae);border-radius:50%}

  /* NEXT CARD - sticker style */
  .next-card{
    background:#fff;border:1.5px solid var(--ink);border-radius:6px;
    padding:28px;position:relative;
    box-shadow:8px 8px 0 var(--ink);
    transform:rotate(-1.2deg);
  }
  .next-card::before{
    content:"";position:absolute;top:-14px;left:30px;width:80px;height:24px;
    background:repeating-linear-gradient(90deg,#fff6,#fff6 6px,transparent 6px,transparent 10px),#ffe8a3;
    transform:rotate(-3deg);border:1px solid rgba(0,0,0,.1);
  }
  .next-card .label{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--orange);font-weight:700}
  .next-card .date{font-family:"Bricolage Grotesque";font-weight:800;font-size:48px;line-height:.9;letter-spacing:-.02em;margin:14px 0 8px}
  .next-card .when{display:flex;justify-content:space-between;align-items:baseline;border-top:1.5px dashed var(--rule);padding-top:14px;margin-top:14px;font-size:14px}
  .next-card .when b{font-family:"Bricolage Grotesque";font-weight:700;font-size:22px;display:block;letter-spacing:-.01em}
  .spots-bar{height:8px;background:var(--paper-2);border-radius:99px;overflow:hidden;margin:16px 0 8px}
  .spots-bar > span{display:block;height:100%;background:var(--algae);transition:.4s}
  .spots-row{display:flex;justify-content:space-between;font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-2)}
  .next-card .rsvp{
    margin-top:18px;width:100%;background:var(--orange);color:#fff;
    padding:16px;border-radius:99px;font-weight:700;font-size:15px;letter-spacing:.04em;text-transform:uppercase;
    display:flex;align-items:center;justify-content:center;gap:10px;
    box-shadow:0 4px 0 var(--orange-deep);transition:.1s;
  }
  .next-card .rsvp:active{transform:translateY(2px);box-shadow:0 2px 0 var(--orange-deep)}
  .next-card .rsvp.confirmed{background:var(--algae);box-shadow:0 4px 0 #3e6125}
  .next-card .rsvp.confirmed::before{content:"✓ "}

  /* WAVE DIVIDER */
  .wave{display:block;width:100%;height:60px;color:var(--ink)}

  /* VALUE STRIP */
  .strip{background:var(--ink);color:var(--paper);padding:24px 0;overflow:hidden}
  .strip-track{display:flex;gap:48px;font-family:"Bricolage Grotesque";font-weight:700;font-size:42px;letter-spacing:-.02em;white-space:nowrap;animation:slide 30s linear infinite;align-items:center}
  .strip-track span{display:inline-flex;align-items:center;gap:48px}
  .strip-track span .dot{display:inline-block;width:12px;height:12px;background:var(--orange);border-radius:50%;margin-left:48px}
  .strip-track .italic{font-style:italic;color:var(--orange)}
  @keyframes slide{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  /* SECTION */
  .section{padding:120px 0;position:relative}
  .section + .section{padding-top:0}
  .sh{margin-bottom:48px;display:grid;grid-template-columns:1.5fr 1fr;gap:48px;align-items:end}
  .sh .eyebrow{font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--orange);font-weight:700;display:inline-flex;align-items:center;gap:12px}
  .sh .eyebrow::before{content:"";width:32px;height:1.5px;background:var(--orange)}
  .sh h3{font-family:"Bricolage Grotesque";font-weight:700;font-size:clamp(48px,7vw,108px);line-height:.92;letter-spacing:-.03em;margin:16px 0 0}
  .sh h3 em{font-style:italic;color:var(--coral)}
  .sh h3 .uline{background:linear-gradient(180deg,transparent 76%,var(--orange) 76%,var(--orange) 86%,transparent 86%);padding:0 4px}
  .sh .aside{color:var(--ink-2);font-size:16px;max-width:42ch;padding-bottom:8px}

  /* RSVP — TABS + LIST */
  .rsvp-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:32px;border-bottom:1.5px solid var(--rule);padding-bottom:0}
  .rsvp-tab{
    padding:14px 20px;font-weight:600;font-size:14px;border-radius:0;
    border-bottom:3px solid transparent;margin-bottom:-1.5px;
    display:inline-flex;align-items:center;gap:10px;color:var(--ink-2);
  }
  .rsvp-tab.on{color:var(--ink);border-color:var(--orange)}
  .rsvp-tab .count{font-family:"JetBrains Mono",monospace;font-size:11px;background:var(--paper-2);padding:3px 7px;border-radius:99px;color:var(--ink-2);letter-spacing:.05em}
  .rsvp-tab.on .count{background:var(--orange);color:#fff}

  .sessions{display:grid;grid-template-columns:1fr;gap:16px}
  .session{
    display:grid;grid-template-columns:120px 1.4fr 1fr 1.3fr 200px;gap:24px;align-items:center;
    background:#fff;border:1.5px solid var(--ink);border-radius:8px;padding:22px 24px;
    box-shadow:4px 4px 0 var(--ink);
    transition:.1s;position:relative;
  }
  .session:hover{transform:translate(-1px,-1px);box-shadow:5px 5px 0 var(--ink)}
  .session.full{opacity:.7;background:var(--paper-2);box-shadow:none}
  .session .date-block{display:flex;flex-direction:column;align-items:flex-start;line-height:1}
  .session .month{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--orange);font-weight:700}
  .session .day{font-family:"Bricolage Grotesque";font-weight:800;font-size:54px;letter-spacing:-.03em;line-height:.9;margin:4px 0}
  .session .dow{font-size:13px;color:var(--ink-2);font-weight:500}
  .session .title{font-family:"Bricolage Grotesque";font-weight:700;font-size:22px;letter-spacing:-.015em;line-height:1.1;margin:0 0 4px}
  .session .where{font-size:13px;color:var(--ink-2)}
  .session .tags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .session .tag{font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border:1px solid var(--rule);border-radius:99px;color:var(--ink-2);font-weight:500;font-family:"JetBrains Mono",monospace}
  .session .tag.hot{background:var(--orange);color:#fff;border-color:var(--orange)}
  .session .time{font-family:"Bricolage Grotesque";font-weight:600;font-size:20px;letter-spacing:-.005em}
  .session .time small{display:block;color:var(--ink-2);font-size:12px;font-weight:400;letter-spacing:.04em;font-family:"DM Sans"}
  .session .spots{font-size:13px;color:var(--ink-2)}
  .session .spots b{display:block;color:var(--ink);font-family:"Bricolage Grotesque";font-weight:700;font-size:18px;letter-spacing:-.01em;margin-top:2px}
  .session .rsvp-btn{
    background:var(--ink);color:#fff;padding:14px 20px;border-radius:99px;font-weight:700;font-size:13px;letter-spacing:.05em;text-transform:uppercase;
    display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
    transition:.15s;
  }
  .session .rsvp-btn:hover:not(:disabled){background:var(--orange)}
  .session .rsvp-btn.in{background:var(--algae)}
  .session .rsvp-btn:disabled{background:var(--rule);color:var(--ink-2);cursor:not-allowed}

  .add-cal{
    margin-top:8px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-2);
    text-align:center;text-decoration:underline;font-family:"JetBrains Mono",monospace;
  }

  /* HOW IT WORKS */
  .steps{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;position:relative}
  .step{position:relative;padding:0 0 0 0}
  .step .n{
    font-family:"Bricolage Grotesque";font-weight:800;font-size:140px;line-height:1;letter-spacing:-.04em;color:var(--orange);
    margin-bottom:-30px;
  }
  .step h4{font-family:"Bricolage Grotesque";font-weight:700;font-size:30px;letter-spacing:-.02em;line-height:1.05;margin:0 0 12px}
  .step p{margin:0;color:var(--ink-2);font-size:15px}
  .step.arrow::after{
    content:"→";position:absolute;top:60px;right:-22px;color:var(--orange);font-size:32px;font-weight:700;
  }
  .step:last-child .arrow::after{display:none}

  /* PROGRAMS */
  .programs{display:grid;grid-template-columns:1.4fr 1fr 1fr;grid-template-rows:auto auto;gap:18px}
  .program{
    background:#fff;border:1.5px solid var(--ink);border-radius:8px;
    box-shadow:6px 6px 0 var(--ink);overflow:hidden;
    display:flex;flex-direction:column;
    transition:.15s;cursor:pointer;
  }
  .program:hover{transform:translate(-2px,-2px);box-shadow:8px 8px 0 var(--ink)}
  .program .photo{
    aspect-ratio:5/3;background:var(--cove);
    position:relative;overflow:hidden;
    border-bottom:1.5px solid var(--ink);
    color:#fff;display:flex;align-items:end;padding:20px;
  }
  .program .photo .ph{
    position:absolute;inset:0;display:grid;place-items:center;
    font-family:"Bricolage Grotesque";font-style:italic;font-weight:500;font-size:14px;
    color:rgba(255,255,255,.55);text-align:center;line-height:1.2;
    background:
      repeating-linear-gradient(135deg,transparent 0 8px,rgba(255,255,255,.04) 8px 9px);
  }
  .program .photo .stamp{
    background:var(--orange);color:#fff;font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    padding:5px 10px;border-radius:99px;position:relative;z-index:1;font-weight:700;
  }
  .program .body{padding:24px;display:flex;flex-direction:column;gap:8px;flex:1}
  .program h4{font-family:"Bricolage Grotesque";font-weight:700;font-size:30px;letter-spacing:-.02em;line-height:1;margin:0}
  .program p{margin:0;color:var(--ink-2);font-size:14px;flex:1}
  .program .more{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.05em;margin-top:8px}
  .program .more::after{content:"→"}

  .program.big{grid-row:1/span 2}
  .program.big .photo{aspect-ratio:auto;flex:1;min-height:280px}
  .program.big h4{font-size:44px}
  .program.feat .photo{background:var(--orange)}
  .program.feat .stamp{background:var(--ink)}
  .program.algae .photo{background:var(--algae)}
  .program.algae .stamp{background:var(--ink)}
  .program.deep .photo{background:var(--cove-deep)}

  /* VOLUNTEER BAND */
  .vol{
    background:var(--teal);color:#fff;padding:96px 0;position:relative;overflow:hidden;
  }
  .vol::before{
    content:"";position:absolute;inset:0;
    background:repeating-linear-gradient(135deg,transparent 0 16px,rgba(255,255,255,.03) 16px 17px);
  }
  .vol .container{display:grid;grid-template-columns:1.3fr 1fr;gap:64px;align-items:center;position:relative}
  .vol h3{font-family:"Bricolage Grotesque";font-weight:800;font-size:clamp(48px,7vw,108px);line-height:.92;letter-spacing:-.03em;margin:0 0 24px}
  .vol h3 em{font-style:italic;color:var(--orange)}
  .vol p{font-size:18px;max-width:50ch;opacity:.95;margin:0 0 28px}
  .vol .btn{
    display:inline-flex;align-items:center;gap:12px;background:var(--orange);color:#fff;padding:18px 28px;border-radius:99px;font-weight:700;font-size:15px;letter-spacing:.04em;text-transform:uppercase;
    box-shadow:0 6px 0 var(--orange-deep);
  }
  .vol .btn::after{content:"→"}
  .vol-card{
    background:var(--paper);color:var(--ink);
    border:1.5px solid var(--ink);border-radius:8px;padding:32px;
    box-shadow:10px 10px 0 var(--ink);transform:rotate(1.5deg);
  }
  .vol-card h4{font-family:"Bricolage Grotesque";font-weight:700;font-size:28px;margin:0 0 16px;letter-spacing:-.02em}
  .vol-card ul{list-style:none;padding:0;margin:0;font-size:15px}
  .vol-card li{padding:12px 0;border-top:1.5px dashed var(--rule);display:flex;align-items:start;gap:12px}
  .vol-card li:first-child{border-top:0}
  .vol-card li .check{
    width:24px;height:24px;border-radius:50%;background:var(--algae);color:#fff;display:grid;place-items:center;font-size:13px;flex-shrink:0;font-weight:700;
  }

  /* FEED */
  .feed{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
  .feed .post{
    aspect-ratio:1/1;background:var(--teal);position:relative;overflow:hidden;border-radius:4px;
    display:grid;place-items:center;color:#fff;
  }
  .feed .post .ph-tag{font-family:"Bricolage Grotesque";font-style:italic;font-size:13px;opacity:.7;font-weight:500;text-align:center;line-height:1.2;padding:8px}
  .feed .post.a{background:var(--orange)}
  .feed .post.b{background:var(--teal)}
  .feed .post.c{background:var(--coral)}
  .feed .post.d{background:var(--ink)}
  .feed .post.e{background:var(--teal-deep)}
  .feed .post::after{
    content:"";position:absolute;inset:0;
    background:repeating-linear-gradient(45deg,transparent 0 6px,rgba(255,255,255,.04) 6px 7px);
  }
  .feed-head{display:flex;justify-content:space-between;align-items:end;margin-bottom:24px}
  .feed-head h3{font-family:"Bricolage Grotesque";font-weight:700;font-size:48px;letter-spacing:-.02em;margin:0;line-height:1}
  .feed-head .handle{font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--ink-2);letter-spacing:.05em}

  /* FAQ */
  .faq{display:grid;grid-template-columns:1fr;gap:0;border-top:1.5px solid var(--ink)}
  .faq-item{border-bottom:1.5px solid var(--ink);padding:24px 0;cursor:pointer}
  .faq-item summary{
    list-style:none;display:flex;justify-content:space-between;align-items:center;gap:24px;
    font-family:"Bricolage Grotesque";font-weight:700;font-size:26px;letter-spacing:-.015em;line-height:1.15;
  }
  .faq-item summary::-webkit-details-marker{display:none}
  .faq-item summary::after{content:"+";font-size:36px;color:var(--orange);font-weight:400;transition:.2s;line-height:0}
  .faq-item[open] summary::after{transform:rotate(45deg)}
  .faq-item .ans{margin-top:16px;color:var(--ink-2);font-size:16px;max-width:72ch;line-height:1.6}

  /* DONATE */
  .donate{
    background:var(--coral);color:#fff;padding:96px 0;position:relative;overflow:hidden;
  }
  .donate::before{
    content:"";position:absolute;inset:-50% -10% auto auto;width:60vw;height:60vw;
    background:rgba(255,255,255,.08);border-radius:50%;
  }
  .donate .container{display:grid;grid-template-columns:1.4fr 1fr;gap:48px;align-items:center;position:relative}
  .donate h3{font-family:"Bricolage Grotesque";font-weight:800;font-size:clamp(56px,8vw,128px);line-height:.9;letter-spacing:-.035em;margin:0}
  .donate h3 em{font-style:italic}
  .donate-amts{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px}
  .donate-amts button{
    background:#fff;color:var(--ink);padding:18px;border-radius:8px;font-family:"Bricolage Grotesque";font-weight:700;font-size:28px;letter-spacing:-.01em;
    border:1.5px solid var(--ink);box-shadow:4px 4px 0 var(--ink);transition:.1s;
  }
  .donate-amts button.on{background:var(--ink);color:#fff}
  .donate-amts button:active{transform:translateY(2px);box-shadow:2px 2px 0 var(--ink)}
  .donate .btn{

  .modal .eyebrow::before{content:"";width:24px;height:1.5px;background:var(--coral)}

  /* ANNOUNCEMENT BANNER */

<body>

<div id="root"></div>

<script type="text/babel">
// ── CMS config ────────────────────────────────────────────────
// Replace with your Supabase values: supabase.com → Project Settings → API
const SUPABASE_URL      = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
const sb = (!SUPABASE_URL.startsWith('YOUR_'))
  ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  : null;

// ── Announcement banner ───────────────────────────────────────
function AnnouncementBanner() {
  const [text, setText] = React.useState(null);
  React.useEffect(() => {
    if (!sb) return;
    sb.from('announcements').select('content')
      .eq('is_published', true)
      .order('id', { ascending: false })
      .limit(1).single()
      .then(({ data }) => { if (data?.content) setText(data.content); });
  }, []);
  if (!text) return null;
  return <div className="ann-banner">{text}</div>;
}

// ─────────────────────────────────────────────────────────────
const { useState, useMemo } = React;

// ─── Live Meetup data config ───────────────────
const TABS = [
  { id: "paddle",   label: "Free Paddle Days" },
  { id: "trips",    label: "River Trips" },
  { id: "volunteer",label: "Volunteer Shifts" },
  { id: "patrol",   label: "Planet Patrol" },
  { id: "training", label: "Volunteer Trips & Training" },
];

// Format "2026-05-17" → "Sat, May 17"
function fmtDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
}
// Format "09:00" → "9am"
function fmtTime(t) {
  if (!t) return '';
  const [h, m] = t.split(':').map(Number);
  const ap = h >= 12 ? 'pm' : 'am';
  const h12 = h % 12 || 12;
  return m === 0 ? `${h12}${ap}` : `${h12}:${String(m).padStart(2,'0')}${ap}`;
}

// ─── Session card (live Meetup data) ──────────
function Session({ s }) {
  const { month, day, dow } = React.useMemo(() => {
    const d = new Date(s.date + 'T' + (s.time || '12:00'));
    return {
      month: d.toLocaleString('en-US', { month:'short' }).toUpperCase(),
      day:   d.getDate(),
      dow:   d.toLocaleString('en-US', { weekday:'long' }),
    };
  }, [s.date, s.time]);

  return (
    <article className="session">
      <div className="date-block">
        <span className="month">{month}</span>
        <span className="day">{day}</span>
        <span className="dow">{dow}</span>
      </div>
      <div>
        <h4 className="title">{s.name}</h4>
        <div className="where">Maxwell Place Cove · Hoboken, NJ</div>
        <div className="tags">
          <span className="tag">Free</span>
          <span className="tag">Waiver req'd</span>
          <span className="tag">All ages 5+</span>
        </div>
      </div>
      <div className="time">
        {fmtTime(s.time) || 'See Meetup'}<small>EDT · Maxwell Pl</small>
      </div>
      <div className="spots">
        <span>Registration</span>
        <b style={{color:'var(--teal)'}}>Open on Meetup</b>
        <div style={{fontSize:'12px',color:'var(--ink-2)',marginTop:'4px',fontFamily:'"JetBrains Mono",monospace',letterSpacing:'.05em'}}>
          Spots listed on event page
        </div>
      </div>
      <div>
        <a href={s.url} target="_blank" rel="noopener noreferrer" className="rsvp-btn">
          RSVP on Meetup
        </a>
        <div className="add-cal">Redirects to Meetup →</div>
      </div>
    </article>
  );
}

// ─── Meetup live events ──────────────────────────────
function EventCard({ event, meta }) {
  const { date, month, dow, timeLabel } = React.useMemo(() => {
    const d = new Date(event.date + 'T' + (event.time || '00:00'));
    return {
      date: d.getDate(),
      month: d.toLocaleString('en-US', { month: 'short' }).toUpperCase(),
      dow: d.toLocaleString('en-US', { weekday: 'short' }).toUpperCase(),
      timeLabel: event.time
        ? new Date('1970-01-01T' + event.time)
            .toLocaleString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true })
            .toUpperCase()
        : '',
    };
  }, [event.date, event.time]);

  // CMS-managed RSVP status
  const status     = meta?.status || null;            // 'open' | 'waitlist' | 'closed' | null
  const rsvpCount  = meta?.rsvp_count  || 0;
  const totalSpots = meta?.total_spots || 0;
  const hasStatus  = meta && totalSpots > 0;
  const pct        = hasStatus ? Math.min(100, (rsvpCount / totalSpots) * 100) : 0;
  const spotsLeft  = totalSpots - rsvpCount;

  const barBg = status === 'closed'   ? 'var(--coral)'
              : status === 'waitlist' ? 'var(--orange)'
              : pct > 80              ? 'var(--orange)' : 'var(--algae)';

  const btnLabel = status === 'waitlist' ? 'Join Waitlist →'
                 : status === 'closed'   ? 'Registration Closed'
                 : 'Register on Meetup →';

  return (
    <article className="event-card">
      <div className="event-card-top">
        <div className="event-date-badge">
          <span className="ev-month">{month}</span>
          <span className="ev-day">{date}</span>
          <span className="ev-dow">{dow}</span>
        </div>
        <div style={{flex:1,minWidth:0}}>
          {timeLabel && <div className="event-time-label">{timeLabel} EDT</div>}
          <h4 className="event-title">{event.name}</h4>
        </div>
      </div>
      <div className="event-card-body">
        {event.description && <p className="event-desc">{event.description}</p>}

        {hasStatus && (
          <div>
            {status === 'waitlist' && <div className="ev-badge ev-badge-waitlist">⚠ Waitlisted</div>}
            {status === 'closed'   && <div className="ev-badge ev-badge-closed">✕ Registration Closed</div>}
            <div className="event-spots-row">
              <span>
                {status === 'open'     ? `${spotsLeft} spots left`
               : status === 'waitlist' ? 'Event full — waitlist open'
               :                        'No spots available'}
              </span>
              <span>{rsvpCount} / {totalSpots} registered</span>
            </div>
            <div className="event-spots-bar">
              <span style={{
                width: status === 'open' ? `${pct}%` : '100%',
                background: barBg,
              }} />
            </div>
          </div>
        )}

        <a
          href={status === 'closed' ? undefined : event.url}
          target={status === 'closed' ? undefined : '_blank'}
          rel="noopener noreferrer"
          className={"event-register-btn" + (status === 'waitlist' ? ' waitlist' : status === 'closed' ? ' closed' : '')}>
          {btnLabel}
        </a>
      </div>
    </article>
  );
}

function LiveEvents() {
  const [evState, setEvState] = React.useState({ events: null, loading: true, error: null });
  const [metaMap, setMetaMap] = React.useState({});

  React.useEffect(() => {
    const eventsP = fetch('/.netlify/functions/meetup-events')
      .then(r => r.ok ? r.json() : Promise.reject('HTTP ' + r.status))
      .catch(() => ({ error: 'Could not load events' }));

    const metaP = sb
      ? sb.from('event_meta').select('*').then(({ data }) => data || [])
      : Promise.resolve([]);

    Promise.all([eventsP, metaP]).then(([evData, metaData]) => {
      // Build lookup: meetup_url → meta row
      const map = {};
      metaData.forEach(m => { map[m.meetup_url] = m; });
      setMetaMap(map);

      if (evData?.error) setEvState({ events: null, loading: false, error: evData.error });
      else setEvState({ events: evData, loading: false, error: null });
    });
  }, []);

  // Match event URL to a meta row (exact first, then partial)
  function getMeta(event) {
    if (metaMap[event.url]) return metaMap[event.url];
    const key = Object.keys(metaMap).find(u =>
      event.url.includes(u.split('/events/')[1] || '__none__')
    );
    return key ? metaMap[key] : null;
  }

  const { events, loading, error } = evState;
  const empty = !loading && (!events || events.length === 0);

  return (
    <section className="container meetup-events" id="events">
      <div className="sh">
        <div>
          <span className="eyebrow">Meetup · Live events</span>
          <h3 className="display">On the water,<br /><em>this season.</em></h3>
        </div>
        <p className="aside">All events are free. RSVP through Meetup to hold your spot — we cap sessions so you get real time on the water, not five minutes.</p>
      </div>
      <div className="events-grid">
        {loading && (
          <div className="events-status">
            <i className="pulse-dot" />
            <h4>Loading events…</h4>
            <p>Pulling from Meetup now.</p>
          </div>
        )}
        {(error || empty) && !loading && (
          <div className="events-status">
            <h4>No upcoming events right now.</h4>
            <p>
              Check our{' '}
              <a href="https://www.meetup.com/Hoboken-Cove-Community-Boathouse/" target="_blank" rel="noopener">
                Meetup page
              </a>{' '}
              directly — new dates drop each season.
            </p>
          </div>
        )}
        {events && events.map(e => (
          <EventCard key={e.id} event={e} meta={getMeta(e)} />
        ))}
      </div>
    </section>
  );
}

// ── Client-side RSS fallback (used when Netlify function isn't available) ──
const MEETUP_RSS = 'https://www.meetup.com/Hoboken-Cove-Community-Boathouse/events/rss/';

function categorizeClient(name, desc = '') {
  const t = (name + ' ' + desc).toLowerCase();
  if (t.includes('planet patrol')) return 'patrol';
  if (t.includes('liberty island') || t.includes('circumnavigation') ||
      t.includes('brooklyn bridge') || t.includes('red hook') ||
      t.includes('day trip') || (t.includes('trip') && t.includes('volunteer'))) return 'trips';
  if (t.includes('help with our public program') ||
      (t.includes('volunteer') && t.includes('free kayaking for everyone')) ||
      t.includes('beach crew') || t.includes('boat crew') ||
      t.includes('volunteer orientation') || t.includes('boat maintenance')) return 'volunteer';
  if (t.includes('free kayak') || t.includes('paddle day') ||
      t.includes('free public') || t.includes('free paddl') ||
      (t.includes('maxwell') && !t.includes('volunteer'))) return 'paddle';
  return 'training';
}

function parseClientRss(xml) {
  const now = Date.now();
  const events = [];
  let rest = xml;

  function btwn(str, a, b) {
    const s = str.indexOf(a); if (s === -1) return null;
    const e = str.indexOf(b, s + a.length); if (e === -1) return null;
    return str.slice(s + a.length, e).trim();
  }
  function strip(html) {
    return html.replace(/<[^>]*>/g,' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<')
               .replace(/&gt;/g,'>').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim().slice(0,240);
  }
  function toEastern(d) {
    const parts = new Intl.DateTimeFormat('en-US', {
      timeZone:'America/New_York', year:'numeric', month:'2-digit',
      day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false,
    }).formatToParts(d);
    const g = type => parts.find(p => p.type === type)?.value || '00';
    return {
      date: `${g('year')}-${g('month')}-${g('day')}`,
      time: `${String(parseInt(g('hour')) % 24).padStart(2,'0')}:${g('minute')}`,
    };
  }

  while (events.length < 30) {
    const s = rest.indexOf('<item>'); if (s === -1) break;
    const e = rest.indexOf('</item>', s); if (e === -1) break;
    const block = rest.slice(s + 6, e);
    rest = rest.slice(e + 7);

    const title = btwn(block,'<title><![CDATA[',']]></title>') ?? btwn(block,'<title>','</title>');
    const link  = btwn(block,'<link><![CDATA[',']]></link>')   ?? btwn(block,'<link>','</link>')  ??
                  btwn(block,'<guid><![CDATA[',']]></guid>')   ?? btwn(block,'<guid>','</guid>');
    const pub   = btwn(block,'<pubDate>','</pubDate>');
    const desc  = btwn(block,'<description><![CDATA[',']]></description>') ?? btwn(block,'<description>','</description>');

    if (!title || !link || !pub) continue;
    const dt = new Date(pub);
    if (isNaN(dt) || dt.getTime() < now) continue;

    const { date, time } = toEastern(dt);
    const name = title.trim();
    const description = desc ? strip(desc) : '';
    events.push({
      id: link, name, date, time, description,
      url: link.trim(),
      category: categorizeClient(name, description),
      spots: null, totalSpots: null, rsvpCount: 0,
    });
  }
  return events;
}

  React.useEffect(() => {
    function groupAndSet(data) {
      if (!Array.isArray(data) || data.length === 0) return false;
      const grouped = { paddle:[], trips:[], volunteer:[], patrol:[], training:[] };
      data.forEach(e => { (grouped[e.category || 'training'] ||= []).push(e); });
      grouped.paddle = grouped.paddle.slice(0, 6);
      setLive(grouped);
      return true;
    }

    // 1. Try the Netlify serverless function
    fetch('/.netlify/functions/meetup-events')
      .then(r => r.ok ? r.json() : Promise.reject('no-function'))
      .then(data => { if (!groupAndSet(data)) throw new Error('empty'); })
      .catch(() =>
        // 2. Fallback: fetch RSS via CORS proxy (works on GitHub Pages & local)
